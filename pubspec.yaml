name: slime_quest
description: "Slime Quest - An idle RPG adventure game rebuilt in Flutter"
publish_to: 'none'
version: 1.0.4+192

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.1.3
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  sqflite: ^2.4.1
  uuid: ^4.5.1
  intl: ^0.19.0
  equatable: ^2.0.7
  collection: ^1.18.0
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  cached_network_image: ^3.4.1
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
    - assets/data/

  fonts:
    - family: GameFont
      fonts:
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
